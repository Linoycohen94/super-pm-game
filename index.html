<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super PM World - Yad2 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; overflow: hidden; touch-action: none; height: 100vh; width: 100vw; margin: 0; display: flex; align-items: center; justify-content: center; }
        canvas { background: linear-gradient(to bottom, #1e293b 0%, #334155 100%); display: block; }
        .hud { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 20; }
        #failure-alert { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 100; background: rgba(15, 23, 42, 0.4); pointer-events: none; }
        .alert-box { background: #000; border: 4px solid #ef4444; padding: 30px 50px; color: #ef4444; font-family: 'Press Start 2P', cursive; font-size: 20px; text-align: center; box-shadow: 0 0 50px rgba(239, 68, 68, 0.6); animation: pulseAlert 0.4s ease-in-out infinite alternate; }
        @keyframes pulseAlert { from { transform: scale(1); } to { transform: scale(1.1); } }
        .skill-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s ease; }
        #loading-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: 'Press Start 2P', cursive; font-size: 10px; transition: opacity 0.5s ease; }
        .floating-text { position: absolute; pointer-events: none; color: #f97316; font-weight: 900; animation: floatUp 2s forwards; text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); z-index: 40; white-space: nowrap; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body class="relative">

    <div id="loading-overlay">
        <div class="mb-4 text-orange-500">CONNECTING TO CLOUD...</div>
        <div class="w-48 h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-orange-500 animate-[pulse_1.5s_infinite]"></div>
        </div>
    </div>

    <div id="failure-alert">
        <div class="alert-box" id="alert-text">OUT OF SCOPE!</div>
    </div>

    <div id="game-ui" class="fixed inset-0 z-30 flex items-center justify-center pointer-events-none p-4">
        <div id="start-screen" class="bg-slate-900 border-2 border-orange-500 p-8 md:p-10 rounded-3xl shadow-2xl text-center max-w-lg pointer-events-auto">
            <div class="mb-4 flex justify-center"><div class="bg-orange-500 p-4 rounded-2xl rotate-3 shadow-lg"><span class="text-4xl">🚀</span></div></div>
            <h1 class="text-3xl font-black text-white mb-2 italic tracking-tighter uppercase">Super PM World</h1>
            <p class="text-orange-500 font-bold mb-4 tracking-widest text-sm uppercase">YAD2 EDITION</p>
            <div class="mb-6 space-y-3">
                <label class="block text-[10px] text-slate-500 uppercase font-black tracking-widest text-center">Enter Your Name:</label>
                <input type="text" id="player-name" placeholder="" class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl px-4 py-3 text-white focus:border-orange-500 outline-none transition-all font-bold text-center">
            </div>
            <button onclick="startGame()" id="start-btn" class="w-full bg-orange-500 hover:bg-orange-600 text-white px-10 py-4 rounded-xl font-black text-xl shadow-lg transition-all active:scale-95 uppercase">START MISSION →</button>
            <div class="mt-6 text-[9px] text-slate-500 font-mono uppercase tracking-[0.2em]">Created by Linoy Cohen</div>
        </div>

        <div id="win-screen" class="hidden bg-slate-900 border-4 border-orange-500 p-6 md:p-8 rounded-3xl shadow-2xl text-center max-w-5xl w-full pointer-events-auto max-h-[95vh] overflow-y-auto">
            <div class="flex flex-col lg:flex-row gap-8 text-left">
                <div class="flex-1 space-y-6">
                    <div class="inline-block bg-orange-500 text-black font-black px-3 py-1 rounded text-[10px] tracking-widest uppercase">Mission Accomplished</div>
                    <h2 class="text-4xl font-black text-white italic uppercase tracking-tighter leading-none">KPIs SECURED!</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-800 p-6 rounded-xl border border-white/5 text-center"><div class="text-[10px] text-slate-500 font-bold uppercase mb-1">Final Score</div><div id="final-score-val" class="text-3xl font-black text-orange-500">0</div></div>
                        <div class="bg-slate-800 p-6 rounded-xl border border-white/5 text-center"><div class="text-[10px] text-slate-500 font-bold uppercase mb-1">Time</div><div id="completion-time" class="text-3xl font-black text-cyan-400">0s</div></div>
                    </div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">AI Strategic Toolkit</div>
                    <div id="skill-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2"></div>
                    <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-black hover:bg-orange-500 hover:text-white transition-all shadow-lg mt-4">Play Again</button>
                </div>
                <div class="flex-1">
                    <div class="bg-black/30 p-6 rounded-2xl border border-orange-500/20 shadow-inner h-full min-h-[300px]">
                        <div class="pixel-header mb-6 text-center">LEADERBOARD</div>
                        <table class="score-table"><tbody id="score-rows"></tbody></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="hud flex gap-8">
        <div class="bg-black/50 backdrop-blur-md px-4 py-2 rounded-lg border border-white/10">
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Efficiency</div>
            <div class="text-xl font-black text-orange-500" id="score">0</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcJ8PEWP_EF-VQ_38LTXxmUg2UVmzx-Lg",
            authDomain: "super-pm-world.firebaseapp.com",
            databaseURL: "https://super-pm-world-default-rtdb.firebaseio.com",
            projectId: "super-pm-world",
            storageBucket: "super-pm-world.firebasestorage.app",
            messagingSenderId: "570482891479",
            appId: "1:570482891479:web:062dbfb5eb2f66e5066e92"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const scoresRef = ref(db, 'scores');

        const init = () => {
            const overlay = document.getElementById('loading-overlay');
            const scoresQuery = query(scoresRef, orderByChild('score'), limitToLast(8));
            
            onValue(scoresQuery, (snapshot) => {
                const data = snapshot.val();
                const scores = data ? Object.values(data).sort((a,b) => b.score - a.score) : [];
                renderScores(scores);
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            });
        };

        function renderScores(scores) {
            const rows = document.getElementById('score-rows');
            if(!scores.length) { rows.innerHTML = '<tr><td colspan="2" class="text-center italic text-slate-500">Waiting for data...</td></tr>'; return; }
            rows.innerHTML = scores.map((s,i) => `<tr class="score-row"><td>${i+1}. ${s.name}</td><td class="text-right text-orange-400 font-bold">${s.score}</td></tr>`).join('');
        }

        window.saveFinalScore = (name, score, time) => {
            push(scoresRef, { name: name || "PM", score, time, timestamp: Date.now() });
        };

        init();
    </script>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameState = 'menu', score = 0, playerMoved = false, isDead = false;
        let startTime, introStartTime, introBubbleActive = false;
        const player = { x: 100, y: 0, width: 40, height: 60, speed: 5.5, velX: 0, velY: 0, jumping: false, grounded: false };
        const skillsData = [
            {n: 'Vibe Coding', i: '🤖'}, {n: 'Slides', i: '📊'}, {n: 'Mockups', i: '🎨'}, {n: 'Strategy', i: '🧠'},
            {n: 'Summaries', i: '📝'}, {n: 'Analytics', i: '📈'}, {n: 'BRDs', i: '📄'}, {n: 'Market Res.', i: '🔍'},
            {n: 'Data Org', i: '📂'}, {n: 'Dev Tickets', i: '🎫'}, {n: 'Brainstorm', i: '💡'},
            {n: 'Musical', i: '🎵', url: 'https://www.youtube.com/watch?v=CCvqVZxFfAg&list=RDCCvqVZxFfAg&start_radio=1'}
        ];
        let goal = { x: 3800, y: 0, width: 120, height: 220 };
        const keys = { right: false, left: false, up: false };

        function initWorld() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            player.y = canvas.height * 0.85 - 100; player.x = 100;
            goal.y = canvas.height * 0.85 - goal.height;
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            gameState = 'playing'; startTime = Date.now(); introStartTime = Date.now();
            introBubbleActive = true; initWorld(); requestAnimationFrame(gameLoop);
        }

        function handleFailure() {
            if (isDead) return; isDead = true;
            document.getElementById('failure-alert').style.display = 'flex';
            setTimeout(() => { document.getElementById('failure-alert').style.display = 'none'; player.x = 100; isDead = false; }, 1200);
        }

        function update() {
            if (gameState !== 'playing' || isDead) return;
            if (keys.up && player.grounded) { player.velY = -15.4; player.grounded = false; playerMoved = true; }
            if (keys.right) { player.velX = 5; playerMoved = true; }
            if (keys.left) { player.velX = -5; playerMoved = true; }
            player.velX *= 0.85; player.velY += 0.5; player.x += player.velX; player.y += player.velY;
            if (player.y > canvas.height * 0.85 - player.height) { player.y = canvas.height * 0.85 - player.height; player.velY = 0; player.grounded = true; }
            
            if (player.x > goal.x) { 
                gameState = 'win';
                const finalTime = Math.floor((Date.now() - startTime) / 1000);
                const finalScore = Math.max(0, 5000 - (finalTime * 15));
                document.getElementById('final-score-val').innerText = finalScore;
                document.getElementById('completion-time').innerText = finalTime + "s";
                window.saveFinalScore(document.getElementById('player-name').value, finalScore, finalTime);
                document.getElementById('win-screen').classList.remove('hidden');
                document.getElementById('skill-grid').innerHTML = skillsData.map(s => {
                    const isMusical = s.n === 'Musical';
                    const content = `<span class="text-lg">${s.i}</span><span class="text-[7px] uppercase">${s.n}</span>`;
                    if (isMusical) return `<a href="${s.url}" target="_blank" class="skill-card p-1.5 rounded flex flex-col items-center justify-center bg-orange-500/20 border-orange-500/50 hover:scale-105 transition">${content}</a>`;
                    return `<div class="skill-card p-1.5 rounded flex flex-col items-center justify-center">${content}</div>`;
                }).join('');
            }
            if (introBubbleActive && Date.now() - introStartTime > 3000 && playerMoved) introBubbleActive = false;
            if (player.y > canvas.height) handleFailure();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-player.x + canvas.width/4, 0);
            // Ground
            ctx.fillStyle = "#1e293b"; ctx.fillRect(0, canvas.height * 0.85, 5000, 400);
            ctx.fillStyle = "#f97316"; ctx.fillRect(0, canvas.height * 0.85, 5000, 4);
            // Tower
            ctx.fillStyle = "#94a3b8"; ctx.fillRect(goal.x, goal.y, goal.width, goal.height);
            // Flagpole
            ctx.strokeStyle = "#475569"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(goal.x + 60, goal.y); ctx.lineTo(goal.x + 60, goal.y - 60); ctx.stroke();
            // Flag
            ctx.fillStyle = "#f97316"; ctx.fillRect(goal.x + 60, goal.y - 60, 50, 35);
            ctx.fillStyle = "white"; ctx.font = "bold 11px Inter"; ctx.fillText("yad2", goal.x + 65, goal.y - 37);
            // Player
            ctx.fillStyle = "#f97316"; ctx.fillRect(player.x, player.y, player.width, player.height);
            // Goomba (Basic)
            ctx.fillStyle = "#92400e"; ctx.fillRect(800, canvas.height * 0.85 - 40, 40, 40);
            ctx.fillStyle = "white"; ctx.fillRect(810, canvas.height * 0.85 - 30, 5, 5); ctx.fillRect(825, canvas.height * 0.85 - 30, 5, 5);
            // Intro Bubble
            if (introBubbleActive) {
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.roundRect(player.x - 20, player.y - 100, 200, 70, 10); ctx.fill();
                ctx.fillStyle = "black"; ctx.font = "8px 'Press Start 2P'";
                ctx.fillText("Hey there, I'm Linoy", player.x - 5, player.y - 75);
                ctx.fillText("Let's slAI another day!", player.x - 5, player.y - 55);
            }
            ctx.restore();
        }

        function gameLoop() { update(); draw(); if(gameState === 'playing' || gameState === 'celebrating') requestAnimationFrame(gameLoop); }
        window.addEventListener("keydown", e => { if(e.code==="ArrowRight") keys.right=true; if(e.code==="ArrowLeft") keys.left=true; if(e.code==="ArrowUp" || e.code==="Space") keys.up=true; });
        window.addEventListener("keyup", e => { if(e.code==="ArrowRight") keys.right=false; if(e.code==="ArrowLeft") keys.left=false; if(e.code==="ArrowUp" || e.code==="Space") keys.up=false; });
        initWorld();
    </script>
</body>
</html>
