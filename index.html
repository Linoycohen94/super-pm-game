<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super PM World - Yad2 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a; 
            overflow: hidden; 
            touch-action: none; 
            height: 100vh; 
            width: 100vw; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        canvas { 
            background: linear-gradient(to bottom, #1e293b 0%, #334155 100%); 
            display: block; 
        }

        .hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            pointer-events: none; 
            z-index: 20; 
        }

        /* Centered Death Alert */
        #failure-alert {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(15, 23, 42, 0.4);
            pointer-events: none;
        }

        .alert-box {
            background: #000;
            border: 4px solid #ef4444;
            padding: 30px 50px;
            color: #ef4444;
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.6);
            animation: pulseAlert 0.4s ease-in-out infinite alternate;
        }

        @keyframes pulseAlert {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            color: #f97316;
            font-weight: 900;
            animation: floatUp 2s forwards; 
            text-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
            z-index: 40;
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pixel-header {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #f97316;
            text-transform: uppercase;
        }

        .score-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
        }
        .score-row { background: rgba(255, 255, 255, 0.03); }
        .score-row td { padding: 10px 15px; font-size: 12px; color: #cbd5e1; }
        .score-row:first-child td { color: #fb923c; font-weight: 900; background: rgba(249, 115, 22, 0.1); }
        
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="relative">

    <div id="loading-overlay">
        <div class="mb-4">INITIALIZING SYSTEM...</div>
        <div class="w-48 h-2 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-orange-500 animate-[loading_2s_ease-in-out_infinite]" style="width: 30%"></div>
        </div>
    </div>

    <div id="failure-alert">
        <div class="alert-box" id="alert-text">OUT OF SCOPE!</div>
    </div>

    <div id="game-ui" class="fixed inset-0 z-30 flex items-center justify-center pointer-events-none p-4">
        <div id="start-screen" class="bg-slate-900 border-2 border-orange-500 p-8 md:p-10 rounded-3xl shadow-2xl text-center max-w-lg pointer-events-auto">
            <div class="mb-4 flex justify-center">
                <div class="bg-orange-500 p-4 rounded-2xl rotate-3 shadow-lg"><span class="text-4xl">🚀</span></div>
            </div>
            <h1 class="text-3xl font-black text-white mb-2 italic tracking-tighter uppercase">Super PM World</h1>
            <p class="text-orange-500 font-bold mb-4 tracking-widest text-sm uppercase">YAD2 EDITION</p>
            
            <div class="mb-6 space-y-3">
                <label class="block text-[10px] text-slate-500 uppercase font-black tracking-widest">Enter Your Name:</label>
                <input type="text" id="player-name" placeholder="PM Name" 
                    class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl px-4 py-3 text-white focus:border-orange-500 outline-none transition-all font-bold text-center">
            </div>

            <button onclick="startGame()" id="start-btn" class="w-full bg-orange-500 hover:bg-orange-600 text-white px-10 py-4 rounded-xl font-black text-xl shadow-lg transition-all active:scale-95 group uppercase">
                START MISSION
                <span class="inline-block transition-transform group-hover:translate-x-2 ml-2">→</span>
            </button>
            <div class="mt-6 text-[9px] text-slate-500 font-mono uppercase tracking-[0.2em]">Created by Linoy Cohen</div>
        </div>

        <div id="win-screen" class="hidden bg-slate-900 border-4 border-orange-500 p-6 md:p-8 rounded-3xl shadow-2xl text-center max-w-5xl w-full pointer-events-auto max-h-[95vh] overflow-y-auto">
            <div class="flex flex-col lg:flex-row gap-8 text-left">
                <div class="flex-1 space-y-6">
                    <div class="inline-block bg-orange-500 text-black font-black px-3 py-1 rounded text-[10px] tracking-widest uppercase">Mission Accomplished</div>
                    <h2 class="text-4xl font-black text-white italic uppercase tracking-tighter leading-none">KPIs SECURED!</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-800 p-6 rounded-xl border border-white/5 text-center">
                            <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Final Score</div>
                            <div id="final-score-val" class="text-3xl font-black text-orange-500">0</div>
                        </div>
                        <div class="bg-slate-800 p-6 rounded-xl border border-white/5 text-center">
                            <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Time</div>
                            <div id="completion-time" class="text-3xl font-black text-cyan-400">0s</div>
                        </div>
                    </div>
                    <div id="skill-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2"></div>
                    <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-black hover:bg-orange-500 hover:text-white transition-all uppercase text-sm shadow-lg mt-4">Play Again</button>
                </div>
                <div class="flex-1">
                    <div class="bg-black/30 p-6 rounded-2xl border border-orange-500/20 shadow-inner h-full min-h-[300px]">
                        <div class="pixel-header mb-6 text-center">SCORE BOARD</div>
                        <table class="score-table">
                            <tbody id="score-rows">
                                <tr class="score-row"><td colspan="2" class="text-center">Loading Scores...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="hud flex gap-4 md:gap-8">
        <div class="bg-black/50 backdrop-blur-md px-3 py-1.5 md:px-4 md:py-2 rounded-lg border border-white/10">
            <div class="text-[8px] md:text-[10px] text-slate-400 uppercase font-bold tracking-widest">Score</div>
            <div class="text-lg md:text-xl font-black text-orange-500" id="score">0</div>
        </div>
        <div class="bg-black/50 backdrop-blur-md px-3 py-1.5 md:px-4 md:py-2 rounded-lg border border-white/10">
            <div class="text-[8px] md:text-[10px] text-slate-400 uppercase font-bold tracking-widest">AI Assets</div>
            <div class="text-lg md:text-xl font-black text-cyan-400" id="ai-count">0/3</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, user, appId;

        const init = async () => {
            const overlay = document.getElementById('loading-overlay');
            try {
                // Check if we are in the platform environment
                if (typeof window.__firebase_config !== 'undefined') {
                    const firebaseConfig = JSON.parse(window.__firebase_config);
                    appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'super-pm-world-yad2';
                    const initialToken = typeof window.__initial_auth_token !== 'undefined' ? window.__initial_auth_token : null;

                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    if (initialToken) {
                        await signInWithCustomToken(auth, initialToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                    user = auth.currentUser;
                    setupCloudLeaderboard();
                } else {
                    throw new Error("Local environment detected");
                }
            } catch (error) {
                console.log("Cloud unavailable - switching to Local Mode");
                setupLocalLeaderboard();
            } finally {
                // Ensure overlay is removed within 1s no matter what
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 500);
                }, 800);
            }
        };

        const setupCloudLeaderboard = () => {
            if (!user) return;
            const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            onSnapshot(scoresRef, (snapshot) => {
                let scores = [];
                snapshot.forEach(doc => scores.push(doc.data()));
                scores.sort((a, b) => b.score - a.score);
                renderScores(scores.slice(0, 8));
            }, (err) => {
                setupLocalLeaderboard();
            });
        };

        const setupLocalLeaderboard = () => {
            const scores = JSON.parse(localStorage.getItem('super-pm-scores') || '[]');
            renderScores(scores);
        };

        const renderScores = (scores) => {
            const rows = document.getElementById('score-rows');
            if (!scores || scores.length === 0) {
                rows.innerHTML = '<tr class="score-row"><td colspan="2" class="text-center italic">No scores yet.</td></tr>';
                return;
            }
            rows.innerHTML = scores.map((s, i) => `
                <tr class="score-row">
                    <td class="font-bold">${i + 1}. ${s.name}</td>
                    <td class="text-right">${s.time}s | <span class="text-orange-400 font-black">${s.score}</span></td>
                </tr>
            `).join('');
        };

        window.saveFinalScore = async (name, finalScore, time) => {
            // Always save locally
            let localScores = JSON.parse(localStorage.getItem('super-pm-scores') || '[]');
            localScores.push({ name, score: finalScore, time });
            localScores.sort((a, b) => b.score - a.score);
            localStorage.setItem('super-pm-scores', JSON.stringify(localScores.slice(0, 8)));

            if (db && user) {
                try {
                    const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                    await addDoc(scoresRef, { name, score: finalScore, time, timestamp: Date.now() });
                } catch (e) {}
            }
        };

        init();
    </script>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'menu';
        let score = 0;
        let aiCollected = 0;
        let celebrationTimer = 0;
        let introBubbleActive = false;
        let introStartTime = 0;
        let playerMoved = false;
        let isDead = false;
        let currentPlayerName = "";
        let startTime, finalTime;

        const gravity = 0.5;
        const friction = 0.85;
        const keys = { right: false, left: false, up: false };

        const player = { x: 100, y: 0, width: 40, height: 60, speed: 5.5, velX: 0, velY: 0, jumping: false, grounded: false };

        const skillsData = [
            {n: 'Vibe Coding', i: '🤖'}, {n: 'Slides', i: '📊'}, {n: 'Mockups', i: '🎨'}, {n: 'Strategy', i: '🧠'},
            {n: 'Summaries', i: '📝'}, {n: 'Analytics', i: '📈'}, {n: 'BRDs', i: '📄'}, {n: 'Market Res.', i: '🔍'},
            {n: 'Data Org', i: '📂'}, {n: 'Dev Tickets', i: '🎫'}, {n: 'Brainstorm', i: '💡'}
        ];

        let platforms = [], enemies = [], collectibles = [], goal = { x: 3800, y: 0, width: 120, height: 220 };

        function initWorld() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const groundY = canvas.height * 0.85;
            platforms = [
                { x: 0, y: groundY, width: 1200, height: 400 },
                { x: 1300, y: groundY - 120, width: 400, height: 40 },
                { x: 1800, y: groundY - 240, width: 400, height: 40 },
                { x: 2300, y: groundY - 120, width: 800, height: 400 },
                { x: 3200, y: groundY - 240, width: 400, height: 40 },
                { x: 3700, y: groundY, width: 1500, height: 400 }
            ];
            collectibles = [
                { x: 1350, y: groundY - 180, width: 40, height: 40, type: 'Vibe Coding', icon: '🤖', outcome: 'CRM Automated!' },
                { x: 1900, y: groundY - 300, width: 40, height: 40, type: 'Analytics', icon: '📊', outcome: 'Insights!' },
                { x: 3300, y: groundY - 300, width: 40, height: 40, type: 'AI Synthesis', icon: '✨', outcome: 'BRDs Ready!' }
            ];
            enemies = [
                { x: 600, y: groundY - 40, width: 40, height: 40, speed: 2, range: 150, startX: 600, label: 'Manual Work', type: 'goomba' },
                { x: 2500, y: groundY - 160, width: 40, height: 40, speed: 2.5, range: 200, startX: 2500, label: 'Process Lag', type: 'snail' }
            ];
            goal.y = groundY - goal.height;
            resetPlayerPos();
        }

        function resetPlayerPos() {
            const groundY = canvas.height * 0.85;
            player.x = 100; player.y = groundY - 100;
            player.velX = 0; player.velY = 0;
            isDead = false;
        }

        function drawIntroBubble(ctx, x, y) {
            const lines = ["Hey there, I'm Linoy", "Let's slAI another day!"];
            ctx.save();
            ctx.font = "bold 10px 'Press Start 2P', cursive";
            const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
            const bubbleW = maxW + 30;
            let bx = Math.max(20 + player.x - canvas.width/4, x - bubbleW/2 + 20);
            const by = y - 100;
            ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.roundRect(bx, by, bubbleW, 65, 8); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x+15, by+65); ctx.lineTo(x+20, by+80); ctx.lineTo(x+25, by+65); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "black"; ctx.textAlign = "center";
            ctx.fillText(lines[0], bx + bubbleW/2, by + 25);
            ctx.fillText(lines[1], bx + bubbleW/2, by + 48);
            ctx.restore();
        }

        function drawPixelPlayer(ctx, x, y, width, height, isDancing) {
            const px = width / 10;
            let currentY = y + (isDancing ? Math.sin(Date.now() / 100) * 10 : 0);
            ctx.fillStyle = '#5d4037'; ctx.fillRect(x + px*2, currentY, px*6, px*5);
            ctx.fillRect(x + px, currentY + px, px, px*7); ctx.fillRect(x + px*8, currentY + px, px, px*7);
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(x + px*2, currentY + px*3, px*6, px*5);
            ctx.fillStyle = 'black'; ctx.fillRect(x+px*3, currentY+px*5, px, px); ctx.fillRect(x+px*6, currentY+px*5, px, px);
            ctx.fillStyle = '#f97316'; ctx.fillRect(x + px*2, currentY + px*8, px*6, px*5);
            ctx.fillStyle = '#1e293b'; ctx.fillRect(x+px*2, currentY+px*13, px*2, px*2); ctx.fillRect(x+px*6, currentY+px*13, px*2, px*2);
            ctx.fillStyle = 'black'; ctx.fillRect(x+px, currentY+px*14, px*3, px); ctx.fillRect(x+px*6, currentY+px*14, px*3, px);
        }

        function drawPrincessKPI(ctx, x, y, width, isDancing) {
            const px = width / 10;
            let currentY = y + (isDancing ? Math.cos(Date.now() / 100) * 10 : 0);
            ctx.fillStyle = '#e2e8f0'; ctx.fillRect(x + px*2, currentY - px*2, px*6, px*6);
            ctx.fillStyle = '#f472b6'; ctx.fillRect(x + px, currentY + px*4, px*8, px*8); 
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(x + px*2.5, currentY, px*5, px*5);
            ctx.fillStyle = '#9d174d'; ctx.font = `bold ${px*3.5}px Inter`; ctx.textAlign = 'center'; ctx.fillText('KPI', x + width/2, currentY + px*3.8);
            ctx.fillStyle = '#fbbf24'; ctx.fillRect(x + px*3, currentY - px*3, px*4, px*1.5);
        }

        function drawCastleTower(ctx, x, y, width, height, isDancing) {
            const px = width / 10;
            ctx.fillStyle = '#94a3b8'; ctx.fillRect(x, y, width, height);
            ctx.strokeStyle = '#64748b';
            for(let i=0; i<height; i+=30) { ctx.beginPath(); ctx.moveTo(x, y+i); ctx.lineTo(x+width, y+i); ctx.stroke(); }
            for(let i=0; i<width; i+=px*2) ctx.fillStyle = '#94a3b8', ctx.fillRect(x + i, y - px*2, px, px*2);
            ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.moveTo(x - px*2, y - px*2); ctx.lineTo(x + width/2, y - px*8); ctx.lineTo(x + width + px*2, y - px*2); ctx.fill();
            ctx.fillStyle = '#f97316'; ctx.fillRect(x + width/2, y - px*14, px*5, px*4);
            ctx.fillStyle = 'white'; ctx.font = 'bold 10px Inter'; ctx.fillText('yad2', x + width/2 + 4, y - px*11);
            drawPrincessKPI(ctx, x + width/4, y + 40, width/2, isDancing);
        }

        function drawPixelEnemy(ctx, x, y, width, height, type, label) {
            const px = width / 10;
            if (type === 'goomba') { ctx.fillStyle = '#92400e'; ctx.fillRect(x + px, y + px*2, px*8, px*7); }
            else { ctx.fillStyle = '#0d9488'; ctx.fillRect(x + px, y + px*7, px*9, px*2); ctx.fillStyle = '#f97316'; ctx.fillRect(x + px, y + px*3, px*6, px*5); }
            ctx.font = "bold 12px Inter"; ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText(label, x + width/2, y - 12);
        }

        function startGame() {
            currentPlayerName = document.getElementById('player-name').value || "Champion PM";
            document.getElementById('start-screen').classList.add('hidden');
            gameState = 'playing'; startTime = Date.now(); introStartTime = Date.now();
            introBubbleActive = true; playerMoved = false; initWorld(); requestAnimationFrame(gameLoop);
        }

        function handleFailure(message) {
            if (isDead) return; isDead = true;
            const alertEl = document.getElementById('failure-alert');
            document.getElementById('alert-text').innerText = message;
            alertEl.style.display = 'flex'; score = Math.max(0, score - 200);
            document.getElementById('score').innerText = score;
            setTimeout(() => { alertEl.style.display = 'none'; resetPlayerPos(); }, 1200);
        }

        function update() {
            if (gameState === 'menu' || gameState === 'win' || isDead) return;
            if (gameState === 'celebrating') {
                celebrationTimer++;
                if (celebrationTimer > 150) { 
                    gameState = 'win'; finalTime = Math.floor((Date.now() - startTime) / 1000);
                    const calculatedScore = Math.max(0, (score + 1000) - (finalTime * 15)); 
                    document.getElementById('final-score-val').innerText = calculatedScore;
                    document.getElementById('completion-time').innerText = finalTime + "s";
                    if (window.saveFinalScore) window.saveFinalScore(currentPlayerName, calculatedScore, finalTime);
                    document.getElementById('win-screen').classList.remove('hidden');
                    document.getElementById('skill-grid').innerHTML = skillsData.map(s => `
                        <div class="skill-card p-1.5 rounded flex flex-col items-center justify-center shadow-sm">
                            <span class="text-lg mb-1">${s.i}</span><span class="text-[7px] font-black text-slate-400 uppercase text-center tracking-tighter">${s.n}</span>
                        </div>
                    `).join('');
                }
                return;
            }
            if (introBubbleActive && Date.now() - introStartTime > 3000 && playerMoved) introBubbleActive = false;
            if (keys.up && !player.jumping && player.grounded) { player.jumping = true; player.grounded = false; player.velY = -player.speed * 2.8; playerMoved = true; }
            if (keys.right && player.velX < player.speed) { player.velX++; playerMoved = true; }
            if (keys.left && player.velX > -player.speed) { player.velX--; playerMoved = true; }
            player.velX *= friction; player.velY += gravity; player.x += player.velX; player.y += player.velY; player.grounded = false;
            platforms.forEach(p => {
                if (player.x < p.x + p.width && player.x + player.width > p.x && player.y < p.y + p.height && player.y + player.height > p.y) {
                    if (player.y + player.height/2 < p.y + p.height/2 && player.velY >= 0) { player.grounded = true; player.jumping = false; player.velY = 0; player.y = p.y - player.height; }
                    else if (player.y + player.height/2 > p.y + p.height/2) { player.velY = 0; player.y = p.y + p.height; }
                }
            });
            collectibles.forEach(c => {
                if (!c.collected && player.x < c.x+c.width && player.x + player.width > c.x && player.y < c.y+c.height && player.y + player.height > c.y) {
                    c.collected = true; aiCollected++; score += 1000;
                    const div = document.createElement('div'); div.className = 'floating-text'; div.innerText = c.outcome;
                    div.style.left = (c.x - player.x + canvas.width/4) + 'px'; div.style.top = c.y + 'px';
                    document.body.appendChild(div); setTimeout(() => div.remove(), 2000); 
                    document.getElementById('ai-count').innerText = aiCollected + "/3"; document.getElementById('score').innerText = score;
                }
            });
            enemies.forEach(e => {
                e.x += e.speed; if (Math.abs(e.x - e.startX) > e.range) e.speed *= -1;
                if (player.x < e.x + e.width && player.x + player.width > e.x && player.y < e.y + e.height && player.y + player.height > e.y) handleFailure("PROCESS LAG!");
            });
            if (player.x > goal.x && gameState === 'playing') { gameState = 'celebrating'; celebrationTimer = 0; }
            if (player.y > canvas.height + 50) handleFailure("OUT OF SCOPE!");
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(-player.x + canvas.width/4, 0);
            platforms.forEach(p => { ctx.fillStyle = "#1e293b"; ctx.fillRect(p.x, p.y, p.width, p.height); ctx.fillStyle = "#f97316"; ctx.fillRect(p.x, p.y, p.width, 4); });
            collectibles.forEach(c => { if (!c.collected) { ctx.font = "32px Arial"; ctx.fillText(c.icon, c.x, c.y + 32); ctx.font = "bold 12px Inter"; ctx.fillStyle = "white"; ctx.fillText(c.type, c.x - 5, c.y - 12); } });
            enemies.forEach(e => { drawPixelEnemy(ctx, e.x, e.y, e.width, e.height, e.type, e.label); });
            drawCastleTower(ctx, goal.x, goal.y, goal.width, goal.height, gameState === 'celebrating');
            drawPixelPlayer(ctx, player.x, player.y, player.width, player.height, gameState === 'celebrating');
            if (introBubbleActive) drawIntroBubble(ctx, player.x, player.y); ctx.restore();
        }

        function gameLoop() { if (gameState !== 'menu' && gameState !== 'win') { update(); draw(); requestAnimationFrame(gameLoop); } }
        window.addEventListener("keydown", e => { if (e.code === "ArrowRight") keys.right = true; if (e.code === "ArrowLeft") keys.left = true; if (e.code === "ArrowUp" || e.code === "Space") keys.up = true; });
        window.addEventListener("keyup", e => { if (e.code === "ArrowRight") keys.right = false; if (e.code === "ArrowLeft") keys.left = false; if (e.code === "ArrowUp" || e.code === "Space") keys.up = false; });
        window.addEventListener("resize", () => { initWorld(); }); initWorld();
    </script>
</body>
</html>
